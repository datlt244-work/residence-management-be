name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USER }}/residence-management-be
  CONTAINER_NAME: residence-management-be
  KEYS_DIR: /opt/residence-management/keys

jobs:
  ci:
    name: Test with Gradle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test --no-daemon

  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.image_meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set image tags
        id: image_meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_tag=${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_NAME}:prod-latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t "${{ steps.image_meta.outputs.image_tag }}" -t "${{ steps.image_meta.outputs.latest_tag }}" .

      - name: Push Docker images
        run: |
          docker push "${{ steps.image_meta.outputs.image_tag }}"
          docker push "${{ steps.image_meta.outputs.latest_tag }}"

  deploy_production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
          KEYS_DIR: ${{ env.KEYS_DIR }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          ADMIN_SITE: ${{ secrets.ADMIN_SITE }}
          MANAGER_SITE: ${{ secrets.MANAGER_SITE }}
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,KEYS_DIR,CONTAINER_NAME,DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,DB_PORT,JWT_EXPIRATION,ADMIN_SITE,MANAGER_SITE
          script: |
            set -e
            mkdir -p "${KEYS_DIR}"
            echo "${{ secrets.JWT_RSA_PRIVATE_KEY_B64 }}" | base64 -d > "${KEYS_DIR}/private_key_pkcs8.pem"
            echo "${{ secrets.JWT_RSA_PUBLIC_KEY_B64 }}" | base64 -d > "${KEYS_DIR}/public_key.pem"
            chmod 600 "${KEYS_DIR}/private_key_pkcs8.pem"
            chmod 644 "${KEYS_DIR}/public_key.pem"

            docker pull "${IMAGE_TAG}"
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true

            docker run -d --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p 8080:8080 \
              -e TZ=Asia/Ho_Chi_Minh \
              -e DB_NAME="${DB_NAME}" \
              -e DB_USER="${DB_USER}" \
              -e DB_PASSWORD="${DB_PASSWORD}" \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia%2FHo_Chi_Minh" \
              -e JWT_EXPIRATION="${JWT_EXPIRATION}" \
              -e JWT_RSA_PRIVATE_KEY="file:/app/keys/private_key_pkcs8.pem" \
              -e JWT_RSA_PUBLIC_KEY="file:/app/keys/public_key.pem" \
              -e ADMIN_SITE="${ADMIN_SITE}" \
              -e MANAGER_SITE="${MANAGER_SITE}" \
              -v "${KEYS_DIR}:/app/keys:ro" \
              "${IMAGE_TAG}"

            for i in $(seq 1 30); do
              if curl -fsS "http://localhost:8080/actuator/health" | grep -q '"status":"UP"'; then
                echo "Service is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed"
            docker logs --tail 100 "${CONTAINER_NAME}"
            exit 1
